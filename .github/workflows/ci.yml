name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Type check (web app only)
        run: cd apps/web && bun run typecheck

      - name: Lint (web app only)
        run: cd apps/web && bun run lint

      - name: Build (web app only)
        run: bun run build

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Run tests (web app only)
        run: bun run test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/web/coverage

  e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      # Add E2E tests when implemented
      - name: Run E2E tests
        run: echo "E2E tests to be implemented"
